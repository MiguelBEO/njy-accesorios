<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Panel Admin - N&J Accesorios</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #FFF8F0; color: #2D2D2D; }
    .loader { text-align: center; }
    .loader h2 { font-family: Georgia, serif; color: #8B3A4F; }
    .loader p { color: #999; font-size: 14px; }
    .spinner { width: 40px; height: 40px; border: 3px solid #F5E1E4; border-top-color: #D4AF37; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h2>N&J Accesorios</h2>
    <p>Cargando panel de administración...</p>
  </div>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
